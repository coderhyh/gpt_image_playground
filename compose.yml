services:
  image-playground:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: image-playground
    container_name: image-playground
    ports:
      - "7789:80"
    environment:
      API_KEY: ${API_KEY}
      # 默认上游为 https://nexus.apimf.top/v1，如需更换再取消下行注释
      # API_PROXY_URL: https://nexus.apimf.top/v1
    restart: unless-stopped
